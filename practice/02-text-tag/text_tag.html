<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Use all test_tags -->
     <p>My name is <b>Birendra Paul</b></p>
     <p><i> Learning HTML Daily</i></p><br>  <!-- p tag is use to show the written text in next line-->
     <!-- How to make subscript -->
     <p><u><b>what is subscript</b></u></p>

     <!-- How to make superscript -->
     <p><b><u>what is superscript</u></b></p>
     <p>Mathematical formula: x<sup>2</sup>+ y <sup>2</sup></p>

    
</body>
