<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered List</title>
</head>
 
<body>
    <h2> My current programming course</h2>
    <!-- type attribute is used to change style of list. By default is Arabic number 1, 2 3 -->
    <ol type="i">
        <li>Python</li>
        <li>SC</li>
        <li>App development</li>
        <li>DBMS</li>
    </ol>

</body>
</html>
