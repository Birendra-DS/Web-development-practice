<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defination list</title>
</head>
<body>
    <h1>HTML Defination list </h1>
    <!-- dl tag is used to define heading of defination -->
     <dl>
    <dt>HTML:</dt>
    <!-- The dd element represents the description, definition, or value, part of a term-description group in a description list -->
    <dd>Hypertext Markup language: The standard language for 
        creating web page
    </dd>

    <dt>CSS:</dt>
    <dd>Cascading Style sheets: Use to describe the look and formating
        of a document written in HTML
    </dd>

    </dl>
        
    
</body>
</html>
