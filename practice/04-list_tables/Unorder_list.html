<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered list</title>
</head>
<body>
    <h2> My current programming course</h2>
    <!-- type attribute is used to change style of shape of list. By default is disc. -->
    <ul type="circle">
        <li>Python</li>
        <li>SC</li>
        <li>App development</li>
        <li>DBMS</li>
    </ul>

    
</body>
</html>
